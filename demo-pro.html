<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HospiceLink Pro Demo</title>
  <style>
    :root{
      --bg:#081426;
      --panel:#10203a;
      --panel2:#0d1b31;
      --line:rgba(255,255,255,.10);
      --text:#f4f8ff;
      --muted:#c9d6ea;
      --blue:#49b6ff;
      --green:#8cff66;
      --green-soft:#d8ffe2;
      --red-soft:#ffd9d9;
      --red:#8f1f1f;
      --yellow-soft:#fff3cf;
      --yellow:#7a5a00;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .layout{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100vh;
    }
    .sidebar{
      background:#071120;
      border-right:1px solid var(--line);
      padding:24px 18px;
      position:sticky;
      top:0;
      height:100vh;
    }
    .brand{
      margin-bottom:24px;
    }
    .brand h1{
      font-size:20px;
      margin:0 0 6px;
    }
    .brand p{
      margin:0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .nav{
      display:grid;
      gap:10px;
      margin-top:24px;
    }
    .nav a{
      text-decoration:none;
      color:var(--text);
      padding:12px 14px;
      border-radius:12px;
      background:transparent;
      border:1px solid transparent;
      font-weight:700;
    }
    .nav a.active,
    .nav a:hover{
      background:#10203a;
      border-color:var(--line);
    }
    .main{
      padding:28px 28px 40px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }
    .topbar h2{
      margin:0;
      font-size:34px;
    }
    .topbar p{
      margin:6px 0 0;
      color:var(--muted);
    }
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-weight:800;
      text-decoration:none;
      cursor:pointer;
    }
    .btn-blue{background:var(--blue);color:#081426}
    .btn-green{background:var(--green);color:#081426}
    .btn-dark{background:#122440;color:#fff;border:1px solid var(--line)}
    .btn-small{padding:8px 12px;font-size:13px}
    .hero{
      background:linear-gradient(180deg,#0f1f39,#0b1730);
      border:1px solid var(--line);
      border-radius:22px;
      padding:24px;
      margin-bottom:22px;
    }
    .hero h3{
      font-size:46px;
      margin:0 0 10px;
      color:var(--green);
      line-height:1.05;
    }
    .hero p{
      margin:0;
      color:#d9e5f6;
      font-size:18px;
      line-height:1.7;
    }
    .kpis{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:16px;
      margin-bottom:22px;
    }
    .kpi{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
    }
    .kpi span{
      display:block;
      color:var(--muted);
      font-size:14px;
      margin-bottom:10px;
    }
    .kpi strong{
      font-size:38px;
      line-height:1;
    }
    .section{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:22px;
      padding:22px;
      margin-bottom:22px;
    }
    .section h3{
      margin:0 0 16px;
      font-size:28px;
    }
    .grid-3{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
    }
    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:18px;
    }
    .card{
      background:#fff;
      color:#111;
      border-radius:20px;
      padding:20px;
    }
    .card h4{
      margin:0 0 10px;
      font-size:18px;
    }
    .card p{
      margin:0;
      line-height:1.6;
    }
    .mini-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
    }
    .pill-green{background:var(--green-soft);color:#136c32}
    .pill-red{background:var(--red-soft);color:var(--red)}
    .pill-yellow{background:var(--yellow-soft);color:var(--yellow)}
    .pill-blue{background:#dff1ff;color:#0f5c8a}
    table{
      width:100%;
      border-collapse:collapse;
      background:#fff;
      color:#111;
      border-radius:18px;
      overflow:hidden;
    }
    th,td{
      padding:14px;
      border-bottom:1px solid #e7edf5;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }
    th{
      background:#f4f8fc;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.03em;
    }
    .table-wrap{
      overflow:auto;
      border-radius:18px;
    }
    .pipeline{
  display:grid;
  grid-template-columns:repeat(4,minmax(240px,1fr));
  gap:18px;
  align-items:start;
}
.stage{
  background:linear-gradient(180deg,#10203a,#0c172c);
  border:1px solid var(--line);
  border-radius:20px;
  padding:14px;
  min-height:320px;
  box-shadow:0 14px 30px rgba(0,0,0,.18);
}
.stage-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.stage-title{
  display:flex;
  align-items:center;
  gap:10px;
}
.stage-dot{
  width:12px;
  height:12px;
  border-radius:999px;
}
.stage-count{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:28px;
  height:28px;
  padding:0 8px;
  border-radius:999px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:12px;
  font-weight:800;
}
.stage h4{
  margin:0;
  font-size:17px;
}
.stage-body{
  display:grid;
  gap:12px;
}
.lead-card{
  position:relative;
  background:#fff;
  color:#111;
  border-radius:16px;
  padding:14px 14px 12px;
  box-shadow:0 12px 24px rgba(0,0,0,.12);
  border:1px solid rgba(0,0,0,.06);
  cursor:grab;
  transition:transform .18s ease, box-shadow .18s ease;
}
.lead-card:hover{
  transform:translateY(-2px);
  box-shadow:0 16px 28px rgba(0,0,0,.16);
}
.lead-card:active{
  cursor:grabbing;
}
.lead-card:last-child{margin-bottom:0}
.lead-card::before{
  content:"⋮⋮";
  position:absolute;
  top:10px;
  right:12px;
  color:#9aa5b5;
  font-size:13px;
  letter-spacing:1px;
}
.lead-card strong{
  display:block;
  margin-bottom:6px;
  font-size:15px;
  padding-right:24px;
}
.lead-card small{
  color:#444;
  line-height:1.5;
  display:block;
  margin-bottom:8px;
}
.card-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}
.card-tag{
  display:inline-block;
  padding:5px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  background:#eef4fb;
  color:#36506d;
}
.dot-inquiry{background:#6ec5ff}
.dot-visit{background:#ffd36e}
.dot-pending{background:#ffb36e}
.dot-closed{background:#8cff66}
    .split{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:18px;
    }
    .note-box{
      background:#fff;
      color:#111;
      border-radius:18px;
      padding:18px;
      margin-bottom:14px;
    }
    .note-box:last-child{margin-bottom:0}
    .note-box h4{
      margin:0 0 8px;
      font-size:16px;
    }
    .note-box p{
      margin:0;
      line-height:1.6;
    }
    .footer-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:18px;
    }
    @media (max-width:1100px){
      .kpis,.grid-3,.grid-2,.pipeline,.split{grid-template-columns:1fr}
      .layout{grid-template-columns:1fr}
      .sidebar{position:relative;height:auto}
    }
  .note-form-wrap{
  background:#fff;
  color:#111;
  border-radius:18px;
  padding:18px;
  margin-bottom:18px;
}
.note-form-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
.note-form-grid .full{
  grid-column:1 / -1;
}
.note-form-wrap label{
  display:block;
  font-size:13px;
  font-weight:700;
  margin-bottom:6px;
}
.note-form-wrap input,
.note-form-wrap select,
.note-form-wrap textarea{
  width:100%;
  border:1px solid #d7e0ec;
  border-radius:12px;
  padding:12px;
  font:inherit;
}
.note-form-wrap textarea{
  min-height:110px;
  resize:vertical;
}
.note-help{
  color:#5a6678;
  font-size:13px;
  margin-top:4px;
  line-height:1.5;
}
.note-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}
.admin-banner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.admin-note{
  margin:0 0 18px;
  color:var(--muted);
  font-size:15px;
  line-height:1.6;
}

      <section class="kpis">
        <div class="kpi"><span>New Prospects</span><strong>24</strong></div>
        <div class="kpi"><span>Facility Visits</span><strong>11</strong></div>
        <div class="kpi"><span>Pending Follow-Ups</span><strong>8</strong></div>
        <div class="kpi"><span>Admissions</span><strong>6</strong></div>
        <div class="kpi"><span>User Seats</span><strong>8 / 10</strong></div>
      </section>

     <section class="section" id="users">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
    <h3 style="margin:0;">Admin User Controls</h3>
    <span class="pill pill-purple">Admin View Only</span>
  </div>

  <p style="margin:0 0 18px;color:var(--muted);font-size:15px;line-height:1.6;">
    User view hides this panel. Only the Admin account holder for the company subscription can see seat limits,
    add users, delete users, and manage subscription-level CRM access.
  </p>

  <div class="grid-3">
    <div class="card">
      <h4>Admin Access Only</h4>
      <p>
        Only the Admin account holder for the company subscription can view and manage user controls.
        Standard users do not have access to seat limits, user creation, or user deletion.
      </p>
      <div class="mini-actions">
        <span class="pill pill-blue">Admin Only</span>
      </div>
    </div>

    <div class="card">
      <h4>Add / Delete Users</h4>
      <p>
        Admin can add users, delete users, assign roles, and manage who can access the CRM under the company subscription.
      </p>
      <div class="mini-actions">
        <span class="pill pill-green">Add User</span>
        <span class="pill pill-red">Delete User</span>
      </div>
    </div>

    <div class="card">
      <h4>Seat Limits</h4>
      <p>
        Admin can view seat limits and only add as many users as the purchased subscription allows.
      </p>
      <div class="mini-actions">
        <span class="pill pill-yellow">Seats Used: 8 / 10</span>
      </div>
    </div>
  </div>
</section>

        <h3>Prospect Management</h3>

        <div class="table-wrap" style="margin-top:18px;">

          </table>
        </div>
      </section>

      <section class="section" id="referrals">
  <h3>Referral Sources</h3>

  <div class="grid-3">
    <div class="card">
      <h4>North Dallas Rehab</h4>
      <p>Status: <span class="pill pill-green">Green - Sending Referrals</span></p>
    </div>
    <div class="card">

      <p>Status: <span class="pill pill-green">Green - Sending Referrals</span></p>
    </div>
  </div>

  <div class="section" style="margin-top:18px; background:#0f1c34;">
    <div class="admin-banner">
      <h3 style="margin:0;">Referral Source Management</h3>
      <span class="pill pill-purple">Admin View Only</span>
    </div>

    <p class="admin-note">
      User view hides this panel. Only the Admin account holder can add or delete referral sources for the company CRM.
    </p>

    <div class="grid-3">
      <div class="card">
        <h4>Add Referral Source</h4>
        <p>Admin can add new referral sources to the CRM and assign them to the marketer’s active territory.</p>
        <div class="mini-actions">

        </div>

      <div class="card">

        <div class="mini-actions">
          <span class="pill pill-green">Green = Sending</span>
          <span class="pill pill-red">Red = No Referrals</span>
        </div>
      </div>
    </div>
  </div>
</section>

      <section class="section" id="pipeline">
  <h3>Pipeline</h3>
  <div class="pipeline">
    <div class="stage">
      <div class="stage-header">
        <div class="stage-title">
          <span class="stage-dot dot-inquiry"></span>
          <h4>Inquiry</h4>
        </div>
        <span class="stage-count">2</span>
      </div>
      <div class="stage-body">

        </div>

</section>

      <section class="section" id="notes">
  <h3>Marketer Notes</h3>

  <div class="note-form-wrap">
    <div class="note-form-grid">
      <div>
        <label for="noteNameSelect">Select Name</label>
        <select id="noteNameSelect">
          <option value="">Select a saved name</option>
        </select>
        <div class="note-help">If you have noted before, your name will appear here.</div>
      </div>

      <div>
        <label for="noteNewName">First Time? Add Name</label>
        <input id="noteNewName" type="text" placeholder="Enter your name to save it for next time">

      </div>

      <div>
        <label for="noteDate">Date</label>
        <input id="noteDate" type="date" required>
      </div>

      <div>
        <label for="noteTime">Time</label>
        <input id="noteTime" type="time" required>
      </div>

      <div class="full">
        <label for="noteText">Note</label>
        <textarea id="noteText" placeholder="Enter note details here..." required></textarea>
      </div>
    </div>

    <div class="note-actions">
      <button class="btn btn-green" type="button" onclick="saveDemoNote('pro')">Add Note</button>
    </div>
  </div>

    </div>
  </div>
</section>

  </div>
