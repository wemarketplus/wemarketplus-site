<!DOCTYPE html>
<html>
<head>
  <title>HospiceLink Pro CRM</title>

  <script>
    const API_BASE = "https://hospicelink-crm.onrender.com";

    // 🔐 AUTH CHECK
    if (!localStorage.getItem("token")) {
      alert("You must login first");
      window.location.href = "login.html";
    }

    function getToken() {
      return localStorage.getItem("token");
    }

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + getToken()
      };
    }

    // 🔥 TEST BACKEND CONNECTION
    function testAPI() {
      fetch(API_BASE + "/api/protected", {
        method: "GET",
        headers: authHeaders()
      })
      .then(res => res.json())
      .then(data => {
        alert("Backend Connected: " + JSON.stringify(data));
      })
      .catch(err => {
        alert("Error: " + err);
      });
    }

    // 🚪 LOGOUT
    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }
  </script>

</head>

<body style="font-family: Arial; padding: 20px;">

  <h1>HospiceLink Pro Dashboard</h1>

  <button onclick="logout()">Logout</button>
  <button onclick="testAPI()">Test Backend</button>

  <hr><br>

  <h2>Welcome to your CRM</h2>
  <p>This dashboard is now connected to your real backend.</p>

  <br><br>

  <h3>Next Step:</h3>
  <p>We will now connect this to real Prospects, Notes, and Referrals.</p>

</body>
</html>
