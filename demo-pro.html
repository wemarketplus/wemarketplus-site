<!DOCTYPE html>
<html>
<head>
<title>HospiceLink Pro</title>
<style>
body { font-family: Arial; padding:20px; }
input, select, button { margin:5px; padding:8px; }
.card { border:1px solid #ddd; padding:15px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>HospiceLink Pro CRM</h2>

<!-- PROSPECTS -->
<div class="card">
<h3>Add Prospect</h3>

<input placeholder="Prospect Name">

<select>
<option>Inquiry</option>
<option>Pending Admission</option>
<option>Lost</option>
<option>Admitted</option>
</select>

<select id="refList"></select>
<button onclick="addReferral()">Add Referral</button>

<select>
<option>Assign Marketer</option>
<option>Ericka</option>
<option>Team Member</option>
</select>

<button>Add Prospect</button>
</div>

<!-- REFERRAL SOURCE TAB -->
<div class="card">
<h3>Referral Sources</h3>

<input id="refInput" placeholder="New referral">
<button onclick="addReferral()">Add</button>
<button onclick="deleteReferral()">Delete</button>

<select id="refStatus">
<option>Green</option>
<option>Red</option>
</select>

<ul id="refDisplay"></ul>
</div>

<!-- NOTES -->
<div class="card">
<h3>Notes</h3>

<button onclick="getLocation()">Get Current Location</button>
<p id="location"></p>

<textarea placeholder="Enter note"></textarea>

<select>
<option>Immediate Family Outreach</option>
<option>Schedule Visit</option>
<option>RN Assessment</option>
<option>Insurance Verification</option>
<option>Other</option>
</select>

<button>Save Note</button>
</div>

<script>
let refs = [];

function addReferral(){
let val = document.getElementById("refInput").value;
if(val){
refs.push(val);
renderRefs();
}
}

function deleteReferral(){
refs.pop();
renderRefs();
}

function renderRefs(){
let list = document.getElementById("refDisplay");
let dropdown = document.getElementById("refList");

list.innerHTML="";
dropdown.innerHTML="";

refs.forEach(r=>{
list.innerHTML += "<li>"+r+"</li>";
dropdown.innerHTML += "<option>"+r+"</option>";
});
}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("location").innerText =
"Lat: "+pos.coords.latitude+" Long: "+pos.coords.longitude;
});
}
</script>

</body>
</html>
