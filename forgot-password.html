<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — HospiceLink CRM</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#14345f 0%,#09162b 34%,#050b15 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{width:100%;max-width:420px;background:linear-gradient(180deg,#0d1b2e,#08111f);border:1px solid rgba(73,182,255,.2);border-radius:24px;padding:40px 36px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
    .logo{text-align:center;margin-bottom:28px;}
    .logo h1{color:#fff;font-size:22px;font-weight:900;margin-bottom:6px;}
    .logo p{color:rgba(180,200,255,.6);font-size:14px;line-height:1.5;}
    .field{margin-bottom:16px;}
    .field label{display:block;color:rgba(180,200,255,.6);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px;}
    .field input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 16px;color:#f0f5ff;font-size:15px;outline:none;transition:border .2s;}
    .field input:focus{border-color:rgba(73,182,255,.6)}
    .field input::placeholder{color:rgba(255,255,255,.2)}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,#42b7ff,#6ed6ff);color:#07111f;font-size:15px;font-weight:900;cursor:pointer;}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:700;display:none;}
    .msg.success{background:rgba(140,255,102,.1);border:1px solid rgba(140,255,102,.25);color:#8cff66;display:block;}
    .msg.error{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.25);color:#ff9999;display:block;}
    .back{text-align:center;margin-top:20px;}
    .back a{color:rgba(180,200,255,.5);font-size:13px;text-decoration:none;}
    .back a:hover{color:#49b6ff;}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(7,17,31,.3);border-top-color:#07111f;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🔑 Reset Password</h1>
    <p>Enter your email and we'll send you a link to reset your password.</p>
  </div>
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@youragency.com"/>
  </div>
  <button class="btn" id="resetBtn" onclick="sendReset()">Send Reset Link</button>
  <div class="msg" id="msg"></div>
  <div class="back"><a href="login.html">← Back to Login</a></div>
</div>
<script>
const API='https://wemarketplus-backend-1.onrender.com';
async function sendReset(){
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('resetBtn');
  const msg=document.getElementById('msg');
  msg.className='msg';msg.style.display='none';
  if(!email||!email.includes('@')){msg.className='msg error';msg.textContent='Please enter a valid email address.';return;}
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Sending...';
  try{await fetch(API+'/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});}catch(e){}
  msg.className='msg success';
  msg.textContent='✅ If an account exists for '+email+', a reset link has been sent. Check your inbox and spam folder.';
  btn.disabled=false;btn.innerHTML='Send Reset Link';
}
document.getElementById('email').addEventListener('keydown',function(e){if(e.key==='Enter')sendReset();});
document.getElementById('email').focus();
</script>
</body>
</html>
