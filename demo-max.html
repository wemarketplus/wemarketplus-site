<!DOCTYPE html>
<html>
<head>
<title>HospiceLink Gold</title>
<style>
body { font-family: Arial; padding:20px; }
.card { border:1px solid #ddd; padding:15px; margin-bottom:20px; }
</style>
</head>

<body>

<h2>HospiceLink Gold CRM</h2>

<!-- PROSPECT -->
<div class="card">
<h3>Add Prospect</h3>

<input placeholder="Name">

<select>
<option>Inquiry</option>
<option>Pending Admission</option>
<option>Lost</option>
<option>Admitted</option>
</select>

<select id="refList"></select>

<select>
<option>Assign Marketer</option>
</select>

<button>Add</button>
</div>

<!-- REFERRALS -->
<div class="card">
<h3>Referral Sources</h3>

<input id="refInput">
<button onclick="addRef()">Add</button>
<button onclick="delRef()">Delete</button>

<select>
<option>Green</option>
<option>Red</option>
</select>

<ul id="list"></ul>
</div>

<!-- GPS TRACKING -->
<div class="card">
<h3>GPS Mileage Tracker</h3>

<input id="start" placeholder="Start Address">
<input id="end" placeholder="End Address">

<button onclick="calcMiles()">Calculate Miles</button>

<p id="miles"></p>
</div>

<!-- NOTES -->
<div class="card">
<h3>Notes</h3>

<button onclick="getLocation()">Get Current Location</button>
<p id="loc"></p>

<textarea></textarea>

<select>
<option>Schedule Visit</option>
<option>RN Assessment</option>
<option>Insurance</option>
<option>Other</option>
</select>

<button>Save</button>
</div>

<script>
let refs=[];

function addRef(){
let val=document.getElementById("refInput").value;
refs.push(val);
render();
}

function delRef(){
refs.pop();
render();
}

function render(){
let list=document.getElementById("list");
let drop=document.getElementById("refList");

list.innerHTML="";
drop.innerHTML="";

refs.forEach(r=>{
list.innerHTML+="<li>"+r+"</li>";
drop.innerHTML+="<option>"+r+"</option>";
});
}

function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
document.getElementById("loc").innerText =
pos.coords.latitude+", "+pos.coords.longitude;
});
}

function calcMiles(){
document.getElementById("miles").innerText = "Miles Calculated (Demo)";
}
</script>

</body>
</html>
