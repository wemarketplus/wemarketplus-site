<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Set Your Password — HospiceLink CRM</title>
  <style>
    :root{--bg:#06101d;--panel:#0d1b2e;--line:rgba(255,255,255,.10);--text:#f0f5ff;--muted:#8a9dc0;--blue:#49b6ff;--green:#8cff66;--red:#ff6b6b;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#14345f 0%,#09162b 34%,#050b15 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{width:100%;max-width:440px;background:linear-gradient(180deg,#0d1b2e,#08111f);border:1px solid rgba(73,182,255,.2);border-radius:24px;padding:40px 36px;box-shadow:0 30px 80px rgba(0,0,0,.5);}
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap h1{color:var(--text);font-size:24px;font-weight:900;margin-bottom:8px}
    .logo-wrap p{color:var(--muted);font-size:14px;line-height:1.5}
    .field{margin-bottom:16px}
    .field label{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
    .field input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;outline:none;transition:border .2s;}
    .field input:focus{border-color:rgba(73,182,255,.6)}
    .field input::placeholder{color:rgba(255,255,255,.25)}
    .btn{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(90deg,#82f86b,#b8ff79);color:#08101b;font-size:16px;font-weight:900;cursor:pointer;transition:opacity .2s;}
    .btn:hover{opacity:.92}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error-msg{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);border-radius:10px;padding:12px 14px;color:#ff9999;font-size:13px;margin-bottom:16px;display:none;}
    .error-msg.show{display:block}
    .req{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.6}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(8,16,27,.4);border-top-color:#08101b;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <h1>🔐 Set Your Password</h1>
    <p>Welcome! For security, please set a new password before entering your CRM.</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>New Password</label>
    <input type="password" id="newPassword" placeholder="Create a strong password"/>
    <p class="req">At least 8 characters, include a number and symbol (e.g. ! @ # $)</p>
  </div>

  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Repeat your password"
      onkeydown="if(event.key==='Enter')changePassword()"/>
  </div>

  <button class="btn" id="changeBtn" onclick="changePassword()">Set Password & Enter CRM</button>
</div>

<script>
  const API = "https://wemarketplus-backend-1.onrender.com";

  // Verify user is logged in
  const token = localStorage.getItem("hl_token");
  const user = JSON.parse(localStorage.getItem("hl_user") || "{}");
  if(!token){ window.location.href = "login.html"; }

  function showError(msg){
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.classList.add("show");
  }

  async function changePassword(){
    const newPw = document.getElementById("newPassword").value;
    const confirmPw = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("changeBtn");

    if(newPw.length < 8){
      showError("Password must be at least 8 characters.");
      return;
    }
    if(!/[0-9]/.test(newPw)){
      showError("Password must include at least one number.");
      return;
    }
    if(!/[!@#$%^&*]/.test(newPw)){
      showError("Password must include at least one symbol (! @ # $ % ^ & *).");
      return;
    }
    if(newPw !== confirmPw){
      showError("Passwords do not match.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Saving…';

    try {
      const res = await fetch(`${API}/api/auth/change-password`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ newPassword: newPw })
      });

      const data = await res.json();

      if(!res.ok){
        showError(data.message || "Error saving password. Please try again.");
        btn.disabled = false;
        btn.innerHTML = "Set Password & Enter CRM";
        return;
      }

      // Update local user info
      user.mustChangePassword = false;
      localStorage.setItem("hl_user", JSON.stringify(user));

      // Redirect to correct CRM
      const tier = (user.tier || "pro").toLowerCase();
      if(tier === "gold") window.location.href = "crm-gold.html";
      else if(tier === "max") window.location.href = "crm-max.html";
      else window.location.href = "crm-pro.html";

    } catch(err) {
      showError("Connection error. Please try again.");
      btn.disabled = false;
      btn.innerHTML = "Set Password & Enter CRM";
    }
  }
</script>
</body>
</html>
