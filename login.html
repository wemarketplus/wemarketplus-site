<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — HospiceLink CRM</title>
  <style>
    :root{
      --bg:#06101d;
      --panel:#0d1b2e;
      --line:rgba(255,255,255,.10);
      --text:#f0f5ff;
      --muted:#8a9dc0;
      --blue:#49b6ff;
      --green:#8cff66;
      --red:#ff6b6b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:radial-gradient(circle at top,#14345f 0%,#09162b 34%,#050b15 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .card{
      width:100%;max-width:440px;
      background:linear-gradient(180deg,#0d1b2e,#08111f);
      border:1px solid rgba(73,182,255,.2);border-radius:24px;
      padding:40px 36px;box-shadow:0 30px 80px rgba(0,0,0,.5);
    }
    .logo-wrap{text-align:center;margin-bottom:28px}
    .logo-wrap img{width:72px;height:72px;object-fit:contain;background:#fff;border-radius:16px;padding:8px}
    .logo-wrap h1{color:var(--text);font-size:26px;font-weight:900;margin-top:14px;line-height:1.1}
    .logo-wrap p{color:var(--muted);font-size:14px;margin-top:6px}
    .field{margin-bottom:16px}
    .field label{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
    .field input{
      width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);
      border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;
      outline:none;transition:border .2s;
    }
    .field input:focus{border-color:rgba(73,182,255,.6)}
    .field input::placeholder{color:rgba(255,255,255,.25)}
    .btn-login{
      width:100%;padding:15px;border:none;border-radius:12px;
      background:linear-gradient(90deg,#42b7ff,#6ed6ff);
      color:#07111f;font-size:16px;font-weight:900;cursor:pointer;
      transition:opacity .2s,transform .1s;margin-top:4px;
    }
    .btn-login:hover{opacity:.92}
    .btn-login:active{transform:scale(.98)}
    .btn-login:disabled{opacity:.5;cursor:not-allowed}
    .error-msg{
      background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);
      border-radius:10px;padding:12px 14px;color:#ff9999;font-size:13px;
      margin-bottom:16px;display:none;line-height:1.5;
    }
    .error-msg.show{display:block}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(7,17,31,.4);border-top-color:#07111f;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .divider{border:none;border-top:1px solid var(--line);margin:24px 0}
    .back-link{text-align:center;margin-top:20px}
    .back-link a{color:var(--muted);font-size:13px;text-decoration:none}
    .back-link a:hover{color:var(--blue)}
    .tier-badge{
      display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;
      margin-left:8px;vertical-align:middle;
    }
    .badge-pro{background:rgba(73,182,255,.15);color:#49b6ff;border:1px solid rgba(73,182,255,.3)}
    .badge-max{background:rgba(140,255,102,.12);color:#8cff66;border:1px solid rgba(140,255,102,.3)}
    .badge-gold{background:rgba(255,215,0,.15);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
    .welcome-box{
      background:rgba(140,255,102,.08);border:1px solid rgba(140,255,102,.2);
      border-radius:12px;padding:14px 16px;margin-bottom:20px;display:none;
    }
    .welcome-box.show{display:block}
    .welcome-box p{color:#8cff66;font-size:13px;line-height:1.6}
  </style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <img src="assets/site-logo.png" alt="HospiceLink" onerror="this.style.display='none'">
    <h1>HospiceLink CRM</h1>
    <p>Sign in to your account</p>
  </div>

  <div class="welcome-box" id="welcomeBox">
    <p>✅ <strong>Account created!</strong> Check your email for your temporary password, then sign in below.</p>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@youragency.com" autocomplete="email"/>
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>

  <hr class="divider">

  <div class="back-link">
    <a href="forgot-password.html">Forgot password?</a>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    <a href="index.html">← Back to Website</a>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    <a href="mailto:Info@wemarketpluscom.org">Need help?</a>
  </div>
</div>

<script>
  const API = "https://wemarketplus-backend-1.onrender.com";

  // Show welcome box if redirected from checkout
  const params = new URLSearchParams(window.location.search);
  if(params.get("welcome") === "1"){
    document.getElementById("welcomeBox").classList.add("show");
  }

  function showError(msg){
    const el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.classList.add("show");
  }

  function hideError(){
    document.getElementById("errorMsg").classList.remove("show");
  }

  async function doLogin(){
    hideError();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    if(!email || !password){
      showError("Please enter your email and password.");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if(!res.ok || !data.token){
        showError(data.message || "Invalid email or password. Please try again.");
        btn.disabled = false;
        btn.innerHTML = "Sign In";
        return;
      }

      // Store auth token and user info
      localStorage.setItem("hl_token", data.token);
      localStorage.setItem("hl_user", JSON.stringify({
        email: data.email,
        role: data.role,
        tier: data.tier,
        tenantId: data.tenantId,
        mustChangePassword: data.mustChangePassword
      }));

      // Force password change if first login
      if(data.mustChangePassword){
        window.location.href = "change-password.html";
        return;
      }

      // Redirect to correct CRM based on tier
      const tier = (data.tier || "pro").toLowerCase();
      if(tier === "gold"){
        window.location.href = "crm-gold.html";
      } else if(tier === "max"){
        window.location.href = "crm-max.html";
      } else {
        window.location.href = "crm-pro.html";
      }

    } catch(err) {
      showError("Connection error. Please check your internet and try again.");
      btn.disabled = false;
      btn.innerHTML = "Sign In";
    }
  }

  // Auto-focus email field
  document.getElementById("email").focus();
</script>
</body>
</html>
