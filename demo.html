<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM Demo</title>
  <style>
    :root{
      --bg:#071120;
      --card:#0f1b34;
      --line:rgba(255,255,255,.12);
      --text:#f3f7ff;
      --muted:#c8d4e8;
      --blue:#49b6ff;
      --green:#8cff66;
      --red:#ff8d8d;
      --yellow:#ffd86b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Arial, Helvetica, sans-serif;color:var(--text);
      background:radial-gradient(circle at top, #12345f 0%, #09162b 35%, #050b15 100%);
      min-height: 100vh;
    }
    .wrap{max-width:1240px;margin:0 auto;padding:24px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .top h1{margin:0;font-size:38px}
    .sub{color:var(--muted);font-size:18px;line-height:1.6;margin:8px 0 0}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;padding:12px 16px;border:none;
      border-radius:999px;font-weight:900;text-decoration:none;cursor:pointer;
    }
    .btn-blue{background:linear-gradient(90deg,#42b7ff,#6ed6ff);color:#07111f}
    .grid{display:grid;grid-template-columns:2fr 1fr;gap:18px}
    .card{
      background:linear-gradient(180deg, rgba(18,30,60,.96), rgba(9,16,30,.98));
      border:1px solid rgba(73,182,255,.24);border-radius:24px;padding:20px;
      min-height: 400px;
    }
    .card h2,.card h3{margin:0 0 12px}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
    .tab{
      padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);cursor:pointer;font-weight:800;color:#fff;
    }
    .tab.active{background:linear-gradient(90deg,#42b7ff,#6ed6ff);color:#07111f}
    .panel{display:none}
    .panel.active{display:block}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .stat{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px}
    .stat strong{display:block;font-size:28px;margin-bottom:6px}
    .muted{color:var(--muted)}
    .pipeline{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .stage{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px;min-height:150px}
    .chip{
      display:block;background:rgba(73,182,255,.12);border:1px solid rgba(73,182,255,.24);
      padding:10px 12px;border-radius:12px;margin-bottom:10px;font-size:14px;
    }
    .item{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}
    .good{color:var(--green);font-weight:900}
    .warn{color:var(--yellow);font-weight:900}
    textarea,input{
      width:100%;padding:12px;border-radius:12px;border:1px solid var(--line);
      background:#0b1630;color:#fff;margin-top:8px;
    }
    @media (max-width:980px){
      .grid{grid-template-columns:1fr}
      .stats{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 id="title">CRM Loading...</h1>
        <p class="sub" id="subtitle"></p>
      </div>
      <a class="btn btn-blue" href="index.html">Back Home</a>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="grid">
      <div class="card">
        <div id="panel-pipeline" class="panel"></div>
        <div id="panel-notes" class="panel"></div>
        <div id="panel-mileage" class="panel"></div>
        <div id="panel-admin" class="panel"></div>
      </div>

      <div class="card">
        <h3>Package Summary</h3>
        <div id="summary"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const crm = params.get("crm") || "pro";
    const storageKey = `demo_notes_${crm}`;

    const configs = {
      pro: {
        title: "HospiceLink Pro Demo",
        subtitle: "Marketing-only CRM for referral pipelines.",
        tabs: ["Pipeline", "Notes", "Admin"],
        defaultTab: "Pipeline",
        summary: `<div class="item"><strong>Audience:</strong> Marketers</div>`
      },
      gold: {
        title: "HospiceLink Gold Demo",
        subtitle: "Clinical & Marketing support.",
        tabs: ["Notes", "Mileage", "Admin"],
        defaultTab: "Notes",
        summary: `<div class="item"><strong>Audience:</strong> Nurses & Marketers</div>`
      },
      max: {
        title: "HospiceLink Max Demo",
        subtitle: "Full automation and GPS tracking.",
        tabs: ["Pipeline", "Notes", "Mileage", "Admin"],
        defaultTab: "Pipeline",
        summary: `<div class="item"><strong>Audience:</strong> Growth Teams</div>`
      }
    };

    const cfg = configs[crm] || configs.pro;
    document.getElementById("title").textContent = cfg.title;
    document.getElementById("subtitle").textContent = cfg.subtitle;
    document.getElementById("summary").innerHTML = cfg.summary;

    // Render Tabs
    const tabsContainer = document.getElementById("tabs");
    cfg.tabs.forEach(tabName => {
      const btn = document.createElement("button");
      btn.className = "tab" + (tabName === cfg.defaultTab ? " active" : "");
      btn.textContent = tabName;
      btn.onclick = () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("panel-" + tabName.toLowerCase()).classList.add("active");
      };
      tabsContainer.appendChild(btn);
    });

    // Content Templates
    const pipelineHTML = `<h2>Referral Pipeline</h2><div class="pipeline"><div class="stage"><h4>Inquiry</h4><span class="chip">Parkview SNF</span></div><div class="stage"><h4>Admit</h4><span class="chip">Brookstone ALF</span></div></div>`;
    const mileageHTML = `<h2>GPS / Mileage</h2><div class="stat"><strong>63.4</strong> Mi Today</div>`;
    const adminHTML = `<h2>Admin</h2><div class="item">Subscription: <strong>Active</strong></div>`;

    function renderNotes(){
      const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
      let html = `<h2>Notes</h2><textarea id="nBody" placeholder="Add a note..."></textarea><button onclick="saveN()" class="tab active" style="margin-top:10px">Save</button><div id="list" style="margin-top:20px">`;
      saved.forEach(n => { html += `<div class="item">${n}</div>` });
      html += `</div>`;
      document.getElementById("panel-notes").innerHTML = html;
    }

    window.saveN = () => {
      const b = document.getElementById("nBody").value;
      if(!b) return;
      const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
      saved.unshift(b);
      localStorage.setItem(storageKey, JSON.stringify(saved));
      renderNotes();
    };

    // Initialize View
    document.getElementById("panel-pipeline").innerHTML = pipelineHTML;
    document.getElementById("panel-mileage").innerHTML = mileageHTML;
    document.getElementById("panel-admin").innerHTML = adminHTML;
    renderNotes();
    
    // Force active panel on load
    document.getElementById("panel-" + cfg.defaultTab.toLowerCase()).classList.add("active");
  </script>
</body>
</html>
