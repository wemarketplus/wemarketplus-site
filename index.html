<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>We Market Plus LLC | Hospice CRM</title>
  <style>
    /* ... (Existing CSS from your prompt) ... */
  </style>
</head>
<body>

  <nav>
    <div class="brand">
      <img src="asset-site-logo.png.jpg" alt="We Market Plus LLC">
      <div>
        <h1>We Market Plus LLC</h1>
        <p>Connect. Grow. Succeed.</p>
      </div>
    </div>

    <div class="nav-links">
      <a href="#homepage">Home</a>
      <a href="#pricing">Pricing</a>
      <a href="#contact">Contact</a>
      <button type="button" onclick="openModal('loginModal')">Login</button>
      <button type="button" class="btn btn-blue btn-small" onclick="openModal('signupModal')">Sign Up</button>
    </div>
  </nav>

  <section class="section" id="pricing">
    <div class="crm-grid">
      <article class="crm-card">
        <div class="logo-wrap">
          <img src="asset-pro-logo.png.jpg" alt="HospiceLink Pro">
        </div>
        <h4>HospiceLink Pro</h4>
        <div class="price-row">
           <button class="btn btn-green btn-small" onclick="startSubscribe('Pro','0-5 Users','$99/mo','pro_0_5')">Subscribe $99/mo</button>
        </div>
      </article>

      <article class="crm-card">
        <div class="badge">Most Popular</div>
        <div class="logo-wrap">
          <img src="asset-gold-logo.png.jpg" alt="HospiceLink Gold">
        </div>
        <h4>HospiceLink Gold</h4>
        <div class="price-row">
           <button class="btn btn-green btn-small" onclick="startSubscribe('Gold','0-10 Users','$250/mo','gold_0_10')">Subscribe $250/mo</button>
        </div>
      </article>

      <article class="crm-card">
        <div class="logo-wrap">
          <img src="asset-max-logo.png.jpg" alt="HospiceLink Max">
        </div>
        <h4>HospiceLink Max</h4>
        <div class="price-row">
           <button class="btn btn-green btn-small" onclick="startSubscribe('Max','0-10 Users','$199/mo','max_0_10')">Subscribe $199/mo</button>
        </div>
      </article>
    </div>
  </section>

  </body>
</html>
