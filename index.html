<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We Market Plus LLC</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0b1f36, #02070f);
  color:white;
}

nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background: rgba(0,0,0,0.6);
}

nav a {
  color:white;
  margin:0 10px;
  text-decoration:none;
}

.hero {
  text-align:center;
  padding:120px 20px;
}

.hero h1 {
  font-size:60px;
  background: linear-gradient(90deg,#00f0ff,#00ff9f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn {
  background: linear-gradient(90deg,#00f0ff,#00ff9f);
  padding:14px 28px;
  border-radius:30px;
  color:black;
  text-decoration:none;
  font-weight:bold;
}

.cards {
  display:flex;
  justify-content:center;
  gap:25px;
  padding:60px;
  flex-wrap:wrap;
}

.card {
  background: rgba(255,255,255,0.05);
  padding:30px;
  border-radius:15px;
  width:280px;
  border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<nav>
  <h2>We Market Plus</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Pricing</a>
    <a href="#">Contact</a>
  </div>
</nav>

<div class="hero">
  <h1>Connect. Grow. Succeed.</h1>
  <p>HospiceLink Pro • Max • Gold</p>
  <br>
  <a class="btn">Get Started</a>
</div>

<div class="cards">

  <div class="card">
    <h2>HospiceLink Pro</h2>
    <p>Marketing CRM built for hospice outreach</p>
  </div>

  <div class="card">
    <h2>HospiceLink Max</h2>
    <p>Marketing, Care & Compliance Platform</p>
  </div>

  <div class="card">
    <h2>HospiceLink Gold</h2>
    <p>Enterprise-level CRM for scaling agencies</p>
  </div>

</div>

</body>
</html>
